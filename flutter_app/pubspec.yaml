name: movie_recommender
description: A beautiful, responsive movie recommendation app built with Flutter.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # HTTP & API
  dio: ^5.3.0
  retrofit: ^4.0.0
  json_serializable: ^6.7.0

  # UI & Animations
  google_fonts: ^6.1.0
  animate_do: ^3.1.2
  lottie: ^2.6.0
  shimmer: ^3.0.0
  
  # Responsive Design
  responsive_framework: ^1.1.0
  flutter_screenutil: ^5.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Additional Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
